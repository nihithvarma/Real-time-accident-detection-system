<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>AccidentWatch – Live Monitoring</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%;overflow:hidden;font-family:Arial;background:#0b0f14;color:#e5e7eb}

header{
  height:56px;display:flex;align-items:center;justify-content:space-between;
  padding:0 20px;background:#111827;border-bottom:1px solid #1f2933
}
header span{color:#22d3ee;font-weight:bold}

.main{display:grid;grid-template-columns:72% 28%;height:calc(100vh - 56px)}

.video{background:black;display:flex;align-items:center;justify-content:center}
.video img{max-width:100%;max-height:100%;object-fit:contain}

.sidebar{
  background:#0f172a;border-left:1px solid #1f2933;
  padding:16px;display:flex;flex-direction:column;gap:16px
}

.status{
  border:2px solid #22c55e;border-radius:8px;padding:18px;text-align:center
}
.status.danger{border-color:#ef4444}

.stats{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.stat{background:#020617;border:1px solid #1f2933;border-radius:8px;padding:14px;text-align:center}

.log{flex:1;background:#020617;border:1px solid #1f2933;border-radius:8px;padding:10px;font-size:12px}
</style>
</head>

<body>

<header>
  <div>Accident<span>Watch</span></div>
  <div id="clock">--:--:--</div>
</header>

<div class="main">
  <div class="video">
    <img src="/video_feed">
  </div>

  <div class="sidebar">
    <div class="status" id="statusBox">
      <h2 id="statusText">ALL CLEAR</h2>
      <p>Monitoring traffic</p>
    </div>

    <div class="stats">
      <div class="stat"><h3 id="detections">0</h3><p>Detections</p></div>
      <div class="stat"><h3 id="confidence">5%</h3><p>Confidence</p></div>
    </div>

    <div class="log" id="log">System running…</div>
  </div>
</div>

<script>
async function poll(){
  const r = await fetch('/status')
  const d = await r.json()

  document.getElementById('detections').textContent = d.detections
  document.getElementById('confidence').textContent = Math.round(d.accident_conf*100) + '%'

  const box = document.getElementById('statusBox')
  const txt = document.getElementById('statusText')

  if(d.accident){
    box.classList.add('danger')
    txt.textContent = 'ACCIDENT CONFIRMED'
  }else{
    box.classList.remove('danger')
    txt.textContent = 'ALL CLEAR'
  }
}

setInterval(poll,1500)
setInterval(()=>document.getElementById('clock').textContent=new Date().toLocaleTimeString(),1000)
</script>

</body>
</html>
